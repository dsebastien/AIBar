name: Release

on:
    release:
        types: [published]
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build-tauri:
        name: Build Tauri (${{ matrix.target }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: linux
                    - os: windows-latest
                      target: windows
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - uses: dtolnay/rust-toolchain@stable

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: '. -> target'

            - name: Install Linux dependencies
              if: matrix.target == 'linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsecret-1-dev

            - run: bun install --frozen-lockfile

            - name: Build Tauri app
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tagName: v__VERSION__
                  releaseName: 'AIBar v__VERSION__'
                  releaseBody: 'See the assets to download and install this version.'
                  releaseDraft: true
                  prerelease: false

    build-cli:
        name: Build CLI (${{ matrix.name }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: linux-x64
                      os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                    - name: linux-arm64
                      os: ubuntu-24.04-arm
                      target: aarch64-unknown-linux-gnu
                    - name: windows-x64
                      os: windows-latest
                      target: x86_64-pc-windows-msvc
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: '. -> target'

            - name: Install Linux dependencies
              if: contains(matrix.os, 'ubuntu')
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libsecret-1-dev

            - name: Build CLI
              run: cargo build --release --manifest-path src-cli/Cargo.toml --target ${{ matrix.target }}

            - name: Package (Linux)
              if: contains(matrix.os, 'ubuntu')
              shell: bash
              run: |
                  TAG="${GITHUB_REF_NAME:-dev}"
                  ASSET="aibar-cli-${TAG}-${{ matrix.name }}.tar.gz"
                  tar czf "$ASSET" -C "target/${{ matrix.target }}/release" aibar-cli
                  sha256sum "$ASSET" > "$ASSET.sha256"
                  echo "ASSET=$ASSET" >> "$GITHUB_ENV"

            - name: Package (Windows)
              if: matrix.os == 'windows-latest'
              shell: pwsh
              run: |
                  $TAG = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "dev" }
                  $ASSET = "aibar-cli-${TAG}-${{ matrix.name }}.zip"
                  Compress-Archive -Path "target/${{ matrix.target }}/release/aibar-cli.exe" -DestinationPath $ASSET
                  $hash = (Get-FileHash $ASSET -Algorithm SHA256).Hash.ToLower()
                  "$hash  $ASSET" | Out-File "$ASSET.sha256"
                  echo "ASSET=$ASSET" >> $env:GITHUB_ENV

            - name: Upload release assets
              if: github.event_name == 'release'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: bash
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  gh release upload "$TAG" "$ASSET" "$ASSET.sha256" --clobber

            - name: Upload workflow artifact
              if: github.event_name != 'release'
              uses: actions/upload-artifact@v4
              with:
                  name: aibar-cli-${{ matrix.name }}
                  path: |
                      ${{ env.ASSET }}
                      ${{ env.ASSET }}.sha256
