name: CI

on:
    push:
        branches: [main, 'feature/**']
    pull_request:

jobs:
    frontend-check:
        name: Frontend Checks
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - run: bun install --frozen-lockfile

            - name: Lint
              run: bun run lint

            - name: Format check
              run: bun run format:check

            - name: TypeScript check
              run: bun run tsc

            - name: Frontend tests
              run: bun run test:frontend

    backend-check:
        name: Backend Checks (${{ matrix.target }})
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      target: linux
                    - os: windows-latest
                      target: windows
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt, clippy

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: '. -> target'

            - name: Install Linux dependencies
              if: matrix.target == 'linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsecret-1-dev

            - name: Format check
              run: cargo fmt --check

            - name: Clippy
              run: cargo clippy --all-targets -- -D warnings

            - name: Tests
              run: cargo test

    build:
        name: Build (${{ matrix.target }})
        needs: [frontend-check, backend-check]
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      target: linux
                    - os: windows-latest
                      target: windows
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - uses: dtolnay/rust-toolchain@stable

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: '. -> target'

            - name: Install Linux dependencies
              if: matrix.target == 'linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsecret-1-dev

            - run: bun install --frozen-lockfile

            - name: Build frontend
              run: bun run build

            - name: Build Tauri app
              run: cargo build --release --manifest-path src-tauri/Cargo.toml

            - name: Build CLI
              run: cargo build --release --manifest-path src-cli/Cargo.toml
